<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kontrol Servo ESP32 Cloud</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
    .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
    input[type=number] { padding: 10px; font-size: 18px; width: 100px; text-align: center; }
    button { padding: 12px 20px; font-size: 18px; background-color: #4CAF50; color: white; border: none; cursor: pointer; border-radius: 5px; }
    button:hover { background-color: #45a049; }
    .info { font-size: 16px; color: #333; margin-top: 15px; background: #eef; padding: 10px; border-radius: 5px; }
  </style>
</head>
<body onload="ambilStatusTerakhir()">
  <div class="card">
    <h2>Kontrol Servo via GitHub</h2>
    
    <div class="info">
      Sudut Aktif Saat Ini: <b id="lastAngle">-</b>&deg;
    </div>
    <br>

    <p>Masukkan Sudut Baru (0 - 180):</p>
    <input type="number" id="angleInput" min="0" max="180" value="90">
    <br><br>
    <button onclick="updateAngle()">Kirim Perintah</button>
    <p id="status" style="color: green; margin-top: 15px;"></p>
  </div>

  <script>
    // Konfigurasi API JSONBin Anda
    const BIN_ID = "6a610019f5f4af5e29b201ea";
    const API_KEY = "$2a$10$EuxRo1gtlkFvZwYSFGRa7O7WemORsD8olc7x9tYeJRlyq43DGUFca";
    
    const URL_GET = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;
    const URL_PUT = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

    // Fungsi mengambil data sudut terakhir
    async function ambilStatusTerakhir() {
      try {
        let response = await fetch(URL_GET, {
          method: 'GET',
          headers: { 'X-Master-Key': API_KEY }
        });
        if(response.ok) {
          let data = await response.json();
          let sudut = data.record.angle; 
          document.getElementById('lastAngle').innerText = sudut;
          document.getElementById('angleInput').value = sudut;
        }
      } catch (error) {
        console.error("Gagal memuat status terakhir");
      }
    }

    // Fungsi mengirim perintah sudut baru ke server
    async function updateAngle() {
      let val = document.getElementById('angleInput5'); // Memastikan input terbaca benar
      let inputVal = document.getElementById('angleInput').value;
      document.getElementById('status').innerText = "Mengirim...";

      try {
        let response = await fetch(URL_PUT, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': API_KEY
          },
          body: JSON.stringify({ angle: parseInt(inputVal) })
        });
        
        if(response.ok) {
          document.getElementById('status').innerText = "Berhasil dikirim ke ESP32!";
          document.getElementById('lastAngle').innerText = inputVal;
        } else {
          document.getElementById('status').innerText = "Gagal mengirim! (Cek API Key)";
        }
      } catch (error) {
        document.getElementById('status').innerText = "Kesalahan koneksi / CORS!";
        console.error(error);
      }
    }
  </script>
</body>
</html>
